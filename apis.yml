aid: bird-rides
name: Bird
description: >-
  Bird is a shared electric scooter and bike micromobility operator
  headquartered in Miami, Florida and operating as the global anchor brand of
  Third Lane Mobility, Inc. Founded in 2017 by Travis VanderZanden, Bird
  pioneered the dockless electric scooter category in Santa Monica,
  California and rapidly expanded to hundreds of cities across North America,
  Europe, and the Middle East. After overstating revenue, delisting from the
  NYSE in September 2023 (ticker BRDS), and filing Chapter 11 bankruptcy in
  December 2023, Bird emerged in April 2024 under the new private parent
  company Third Lane Mobility, Inc., which also owns the Spin brand acquired
  from TIER in September 2023. Bird operates the Bird Three e-scooter and a
  Bird Bikeshare service, plus the Bird Platform white-label program for
  independent fleet operators and a Cities partner program that ships
  "in-depth APIs" and operator dashboards to municipal partners. Bird
  publishes public General Bikeshare Feed Specification (GBFS) auto-discovery
  feeds at mds.bird.co for 88+ cities across 12 countries (AT, BE, CA, CH,
  DE, ES, FI, FR, IL, IT, PT, US), and operates a private city-data portal
  at city-data.bird.co for credentialed municipal API access. There is no
  public consumer / 3rd-party developer API or SDK — the consumer surface is
  the iOS and Android Bird apps, the Bird Three product site, and the
  Bikeshare site. The undocumented mobile backend at api.birdapp.com /
  api-auth.prod.birdapp.com is well-documented in the community WoBike
  project but is not officially sanctioned for third-party use.
